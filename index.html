<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioHub Pro - Acervo Oficial</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' },
                        accent: { 500: '#f59e0b', 600: '#d97706' }
                    },
                    borderRadius: { '4xl': '2rem' }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hide { display: none !important; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.5); }
        .book-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-900">

    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="fixed inset-0 z-[1000] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] p-10 md:p-16 max-w-md w-full text-center shadow-2xl animate-in">
            <div class="w-20 h-20 bg-primary-600 rounded-3xl flex items-center justify-center mx-auto mb-8 text-white text-4xl shadow-lg rotate-3">
                <i class="fas fa-book-bookmark"></i>
            </div>
            <h1 class="text-3xl font-extrabold mb-2">BiblioHub Pro</h1>
            <p class="text-slate-500 mb-10 font-medium">Faça login com sua conta Google para acessar os livros do repositório.</p>
            
            <button id="btnLogin" class="w-full flex items-center justify-center gap-4 bg-white border-2 border-slate-200 py-4 rounded-2xl font-bold hover:bg-slate-50 transition-all active:scale-95 text-slate-700">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-6 h-6">
                Entrar com Google
            </button>
            <div id="loginError" class="mt-4 text-red-500 text-sm font-bold hide"></div>
        </div>
    </div>

    <!-- NAVBAR -->
    <nav id="navbar" class="glass-nav fixed top-0 w-full z-[100] hide">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="app.showHome()">
                <div class="bg-primary-600 p-2 rounded-xl text-white shadow-md">
                    <i class="fas fa-layer-group"></i>
                </div>
                <span class="text-xl font-black tracking-tight">BIBLIO<span class="text-primary-600">HUB</span></span>
            </div>
            <div class="flex items-center gap-4">
                <div class="hidden sm:flex items-center gap-3 bg-slate-100 py-1.5 px-3 rounded-full">
                    <img id="userAvatar" src="" class="w-7 h-7 rounded-full shadow-sm">
                    <span id="userName" class="text-xs font-bold text-slate-600"></span>
                </div>
                <button id="btnLogout" class="text-slate-400 hover:text-red-500 transition-colors p-2">
                    <i class="fas fa-sign-out-alt text-lg"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- CONTEÚDO PRINCIPAL -->
    <main id="mainContent" class="pt-28 pb-20 hide">
        
        <!-- HOME / LISTA -->
        <section id="homeView" class="max-w-7xl mx-auto px-6 animate-in">
            <div id="remoteBanner" class="bg-gradient-to-r from-primary-600 to-blue-500 text-white p-6 rounded-3xl mb-12 shadow-xl hide">
                <p id="remoteMsg" class="font-bold text-center text-lg"></p>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
                <div>
                    <h2 class="text-4xl font-black mb-2">Acervo Digital</h2>
                    <p class="text-slate-500 font-medium">Sincronizado com a pasta /livros do seu repositório.</p>
                </div>
                <div class="relative w-full md:w-80">
                    <input type="text" id="searchInput" placeholder="Pesquisar título..." class="w-full pl-12 pr-4 py-3.5 bg-white border-2 border-slate-100 rounded-2xl focus:border-primary-500 outline-none transition-all shadow-sm">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                </div>
            </div>

            <div id="booksGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8">
                <!-- Skeleton Loading -->
                <div class="space-y-3"><div class="skeleton aspect-[2/3] rounded-3xl"></div><div class="skeleton h-4 w-3/4 rounded-md"></div></div>
                <div class="space-y-3"><div class="skeleton aspect-[2/3] rounded-3xl"></div><div class="skeleton h-4 w-3/4 rounded-md"></div></div>
                <div class="space-y-3"><div class="skeleton aspect-[2/3] rounded-3xl"></div><div class="skeleton h-4 w-3/4 rounded-md"></div></div>
            </div>
        </section>

        <!-- DETALHE -->
        <section id="detailView" class="max-w-5xl mx-auto px-6 hide animate-in">
            <button onclick="app.showHome()" class="flex items-center gap-2 text-slate-400 font-bold mb-10 hover:text-primary-600">
                <i class="fas fa-arrow-left"></i> Voltar ao início
            </button>

            <div class="grid md:grid-cols-12 gap-12 items-start">
                <div class="md:col-span-4">
                    <img id="dCover" class="w-full aspect-[2/3] object-cover rounded-[2.5rem] shadow-2xl mb-8">
                    <div class="space-y-3">
                        <button id="btnRead" class="w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all"></button>
                        <button id="btnDownload" class="w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all"></button>
                    </div>
                </div>
                <div class="md:col-span-8">
                    <span id="dCat" class="text-primary-600 text-xs font-black uppercase tracking-widest mb-3 block">CATEGORIA</span>
                    <h3 id="dTitle" class="text-5xl font-black mb-2 leading-tight">Título</h3>
                    <p id="dAuthor" class="text-xl text-slate-400 font-bold mb-10">Autor</p>
                    
                    <div class="bg-white p-8 rounded-4xl shadow-sm border border-slate-100">
                        <h4 class="font-bold text-slate-900 mb-4">Sinopse da Obra</h4>
                        <p id="dDesc" class="text-slate-600 leading-relaxed text-lg font-medium"></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- LEITOR WEB -->
        <section id="readerView" class="fixed inset-0 z-[2000] bg-white hide flex flex-col">
            <div class="h-16 bg-slate-900 text-white flex items-center justify-between px-6">
                <div class="flex items-center gap-4">
                    <button onclick="app.closeReader()" class="w-10 h-10 rounded-lg hover:bg-slate-800 flex items-center justify-center">
                        <i class="fas fa-times"></i>
                    </button>
                    <span id="rTitle" class="font-bold truncate max-w-xs">Leitura</span>
                </div>
            </div>
            <iframe id="readerFrame" src="" class="w-full h-full border-none"></iframe>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getRemoteConfig, fetchAndActivate, getValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-remote-config.js";

        // CONFIGURAÇÃO OFICIAL ENVIADA
        const firebaseConfig = {
            apiKey: "AIzaSyBTbdUYOhLLMFyo3aIx7sfxS12UHkNRaeY",
            authDomain: "livros-web.firebaseapp.com",
            projectId: "livros-web",
            storageBucket: "livros-web.firebasestorage.app",
            messagingSenderId: "1006236008054",
            appId: "1:1006236008054:web:495b33ec29657e87372957",
            measurementId: "G-B50V03QTXW"
        };

        const fApp = initializeApp(firebaseConfig);
        const auth = getAuth(fApp);
        const remoteConfig = getRemoteConfig(fApp);

        remoteConfig.settings.minimumFetchIntervalMillis = 300000;
        remoteConfig.defaultConfig = { "welcome_message": "Seja bem-vindo ao BiblioHub!" };

        let books = [];

        const app = {
            async loadData() {
                try {
                    // Tenta carregar do seu repositório GitHub (Pasta /livros/)
                    const res = await fetch('./livros/data.json').catch(() => null);
                    if (res && res.ok) {
                        books = await res.json();
                    } else {
                        // Fallback temporário para testes
                        books = [
                            { id: 1, name: "O Poder do Hábito", author: "Charles Duhigg", categoria: "Psicologia", capa: "https://m.media-amazon.com/images/I/817-p9iS+9L._AC_UF1000,1000_QL80_.jpg", descricao: "Um guia fascinante sobre como transformar sua vida através de pequenos hábitos.", "url-pdf": "", "url-webbook": "" },
                            { id: 2, name: "Dom Casmurro", author: "Machado de Assis", categoria: "Clássico", capa: "https://m.media-amazon.com/images/I/81A+SGo+yXL._AC_UF1000,1000_QL80_.jpg", descricao: "A clássica dúvida: Capitu traiu ou não Bentinho?", "url-pdf": "https://www.mec.gov.br/domcasmurro.pdf", "url-webbook": "https://www.gutenberg.org/cache/epub/132/pg132-images.html" }
                        ];
                    }
                    this.renderBooks();
                } catch (e) {
                    console.error("Erro ao carregar data.json:", e);
                }
            },

            renderBooks() {
                const grid = document.getElementById('booksGrid');
                const term = document.getElementById('searchInput').value.toLowerCase();
                const filtered = books.filter(b => b.name.toLowerCase().includes(term) || b.author.toLowerCase().includes(term));

                grid.innerHTML = filtered.map(b => `
                    <div class="book-card group cursor-pointer" onclick="app.showDetail(${b.id})">
                        <div class="aspect-[2/3] rounded-3xl overflow-hidden shadow-md mb-4 bg-slate-200">
                            <img src="${b.capa}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <h4 class="font-bold text-slate-900 line-clamp-1">${b.name}</h4>
                        <p class="text-xs text-slate-400 font-bold uppercase mt-1">${b.author}</p>
                    </div>
                `).join('');
            },

            showHome() {
                document.getElementById('homeView').classList.remove('hide');
                document.getElementById('detailView').classList.add('hide');
                window.scrollTo(0,0);
            },

            showDetail(id) {
                const b = books.find(book => book.id === id);
                if (!b) return;

                document.getElementById('dCover').src = b.capa;
                document.getElementById('dTitle').textContent = b.name;
                document.getElementById('dAuthor').textContent = b.author;
                document.getElementById('dCat').textContent = b.categoria;
                document.getElementById('dDesc').textContent = b.descricao;

                const btnRead = document.getElementById('btnRead');
                const btnDown = document.getElementById('btnDownload');

                // Lógica de "Indisponível no momento"
                if (b['url-webbook'] && b['url-webbook'] !== "") {
                    btnRead.innerHTML = `<i class="fas fa-book-open"></i> Ler Livro`;
                    btnRead.className = "w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 bg-primary-600 text-white hover:bg-primary-700 shadow-lg shadow-primary-500/20";
                    btnRead.onclick = () => app.openReader(b['url-webbook'], b.name);
                } else {
                    btnRead.innerHTML = `<i class="fas fa-clock"></i> Indisponível no momento`;
                    btnRead.className = "w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 bg-slate-100 text-slate-400 cursor-not-allowed";
                    btnRead.onclick = null;
                }

                if (b['url-pdf'] && b['url-pdf'] !== "") {
                    btnDown.innerHTML = `<i class="fas fa-download"></i> Baixar PDF`;
                    btnDown.className = "w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 bg-white border-2 border-slate-100 text-slate-700 hover:border-primary-200";
                    btnDown.onclick = () => window.open(b['url-pdf'], '_blank');
                } else {
                    btnDown.innerHTML = `<i class="fas fa-ban"></i> PDF Indisponível`;
                    btnDown.className = "w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 bg-white border-2 border-dashed border-slate-100 text-slate-300 cursor-not-allowed";
                    btnDown.onclick = null;
                }

                document.getElementById('homeView').classList.add('hide');
                document.getElementById('detailView').classList.remove('hide');
                window.scrollTo(0,0);
            },

            openReader(url, title) {
                document.getElementById('rTitle').textContent = title;
                document.getElementById('readerFrame').src = url;
                document.getElementById('readerView').classList.remove('hide');
            },

            closeReader() {
                document.getElementById('readerView').classList.add('hide');
                document.getElementById('readerFrame').src = "";
            }
        };

        // Listeners
        document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => {
            document.getElementById('loginError').textContent = "Erro ao autenticar. Verifique se o domínio está autorizado.";
            document.getElementById('loginError').classList.remove('hide');
        });

        document.getElementById('btnLogout').onclick = () => signOut(auth);
        document.getElementById('searchInput').oninput = () => app.renderBooks();

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hide');
                document.getElementById('navbar').classList.remove('hide');
                document.getElementById('mainContent').classList.remove('hide');
                document.getElementById('userName').textContent = user.displayName;
                document.getElementById('userAvatar').src = user.photoURL;

                // Remote Config
                try {
                    await fetchAndActivate(remoteConfig);
                    const msg = getValue(remoteConfig, 'welcome_message').asString();
                    document.getElementById('remoteMsg').textContent = msg;
                    document.getElementById('remoteBanner').classList.remove('hide');
                } catch(e) {}

                app.loadData();
            } else {
                document.getElementById('loginScreen').classList.remove('hide');
                document.getElementById('navbar').classList.add('hide');
                document.getElementById('mainContent').classList.add('hide');
            }
        });

        window.app = app;
    </script>
</body>
</html>
